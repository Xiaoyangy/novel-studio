<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>novel-studio · 创作进度看板</title>
<style>
  :root {
    --bg: #0a0c12;
    --panel: rgba(255,255,255,.045);
    --panel-hi: rgba(255,255,255,.08);
    --line: rgba(255,255,255,.09);
    --text: #e8ebf4;
    --muted: #8b93a7;
    --accent1: #6d8dff;
    --accent2: #b06dff;
    --ok: #3ddc97;
    --warn: #f5b14c;
    --bad: #ff6b81;
    --info: #58a6ff;
    --cyan: #38d0e0;
    --mono: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(1100px 500px at 85% -10%, rgba(109,141,255,.14), transparent 60%),
      radial-gradient(900px 480px at -10% 110%, rgba(176,109,255,.10), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100%;
  }
  ::selection { background: rgba(109,141,255,.35); }

  header {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; gap: 14px;
    padding: 16px 28px;
    background: rgba(10,12,18,.72);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line);
  }
  .logo {
    width: 12px; height: 12px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    box-shadow: 0 0 14px rgba(109,141,255,.8);
    animation: breathe 2.6s ease-in-out infinite;
  }
  @keyframes breathe { 50% { transform: scale(.78); opacity: .7; } }
  h1 { font-size: 17px; font-weight: 700; letter-spacing: .4px; }
  h1 em { font-style: normal; background: linear-gradient(90deg, var(--accent1), var(--accent2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .head-meta { margin-left: auto; display: flex; align-items: center; gap: 18px; font-size: 12px; color: var(--muted); }
  .head-meta code { font-family: var(--mono); font-size: 11px; color: #aab3c9; }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: 1px; }
  .dot.live { background: var(--ok); box-shadow: 0 0 8px var(--ok); animation: breathe 1.6s infinite; }
  .dot.err  { background: var(--bad); box-shadow: 0 0 8px var(--bad); }

  main { max-width: 1240px; margin: 0 auto; padding: 30px 28px 80px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 22px; }

  .card {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px 22px 18px;
    cursor: pointer;
    transition: transform .25s ease, border-color .25s ease, background .25s ease;
    overflow: hidden;
  }
  .card:hover { transform: translateY(-3px); border-color: rgba(109,141,255,.45); background: var(--panel-hi); }
  .card.active-run::before {
    content: ""; position: absolute; inset: 0 auto 0 0; width: 3px;
    background: linear-gradient(var(--accent1), var(--accent2));
  }
  .card h2 { font-size: 19px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 10px var(--ok); animation: breathe 1.4s infinite; flex: none; }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .pill {
    font-size: 11px; padding: 3px 10px; border-radius: 999px;
    border: 1px solid var(--line); color: var(--muted); letter-spacing: .3px;
  }
  .pill.phase-writing  { color: var(--warn); border-color: rgba(245,177,76,.4); background: rgba(245,177,76,.08); }
  .pill.phase-complete { color: var(--ok);   border-color: rgba(61,220,151,.4); background: rgba(61,220,151,.08); }
  .pill.phase-init     { color: var(--muted); }
  .pill.phase-premise  { color: var(--info); border-color: rgba(88,166,255,.4); background: rgba(88,166,255,.08); }
  .pill.phase-outline  { color: var(--cyan); border-color: rgba(56,208,224,.4); background: rgba(56,208,224,.08); }
  .pill.gen { color: #c9a7ff; border-color: rgba(176,109,255,.35); background: rgba(176,109,255,.07); }

  .prog { margin-top: 16px; }
  .prog .nums { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .prog .nums b { color: var(--text); font-size: 13px; }
  .bar { height: 8px; border-radius: 6px; background: rgba(255,255,255,.07); overflow: hidden; }
  .bar i {
    display: block; height: 100%; border-radius: 6px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    box-shadow: 0 0 12px rgba(109,141,255,.5);
    transition: width .8s cubic-bezier(.22,1,.36,1);
  }
  .tri { display: flex; gap: 14px; margin-top: 8px; font-size: 11px; color: var(--muted); }
  .tri b { color: var(--text); font-variant-numeric: tabular-nums; }

  /* 当前章步骤链 */
  .steps { display: flex; align-items: center; gap: 4px; margin-top: 14px; }
  .steps .lbl { font-size: 11px; color: var(--muted); margin-right: 6px; white-space: nowrap; }
  .step {
    flex: 1; text-align: center; font-size: 10.5px; font-family: var(--mono);
    padding: 4px 0; border-radius: 6px; color: var(--muted);
    background: rgba(255,255,255,.04); border: 1px solid transparent;
  }
  .step.done { color: var(--ok); background: rgba(61,220,151,.08); }
  .step.now  { color: var(--warn); background: rgba(245,177,76,.1); border-color: rgba(245,177,76,.45); animation: chipglow 2s infinite; }
  @keyframes chipglow { 50% { box-shadow: 0 0 12px rgba(245,177,76,.25); } }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 14px; }
  .stat { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.05); border-radius: 10px; padding: 8px 10px; }
  .stat .k { font-size: 10px; color: var(--muted); letter-spacing: .5px; }
  .stat .v { font-size: 14px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }

  .spark { display: flex; align-items: flex-end; gap: 2px; height: 34px; margin-top: 14px; }
  .spark i { flex: 1; min-width: 3px; max-width: 14px; border-radius: 2px 2px 0 0; background: linear-gradient(180deg, rgba(109,141,255,.9), rgba(109,141,255,.25)); transition: height .6s ease; }

  .chips { display: flex; gap: 6px; margin-top: 14px; }
  .chip { flex: 1; text-align: center; font-size: 11px; padding: 5px 0; border-radius: 8px; border: 1px dashed var(--line); color: var(--muted); }
  .chip.done { border-style: solid; color: var(--ok); border-color: rgba(61,220,151,.4); background: rgba(61,220,151,.07); }
  .chip.now  { border-style: solid; color: var(--warn); border-color: rgba(245,177,76,.5); background: rgba(245,177,76,.08); animation: chipglow 2s infinite; }

  .foot { display: flex; justify-content: space-between; margin-top: 14px; font-size: 11px; color: var(--muted); }

  .empty { text-align: center; padding: 90px 0; color: var(--muted); }
  .empty b { display: block; font-size: 18px; color: var(--text); margin-bottom: 8px; }
  .empty code { font-family: var(--mono); color: #aab3c9; }

  /* ---- 详情抽屉 ---- */
  .overlay { position: fixed; inset: 0; background: rgba(4,6,10,.55); backdrop-filter: blur(3px); opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 30; }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: min(860px, 96vw); z-index: 40;
    background: #0d1019; border-left: 1px solid var(--line);
    transform: translateX(102%); transition: transform .32s cubic-bezier(.22,1,.36,1);
    display: flex; flex-direction: column;
  }
  .drawer.show { transform: none; }
  .drawer-head { padding: 18px 26px 0; border-bottom: 1px solid var(--line); }
  .drawer-head .row { display: flex; align-items: center; gap: 12px; }
  .drawer-head h2 { font-size: 20px; }
  .drawer-head .close { margin-left: auto; background: none; border: 1px solid var(--line); color: var(--muted); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 15px; }
  .drawer-head .close:hover { color: var(--text); border-color: var(--muted); }
  .tabs { display: flex; gap: 4px; margin-top: 14px; }
  .tab {
    padding: 8px 16px; font-size: 13px; color: var(--muted); cursor: pointer;
    border: none; background: none; border-bottom: 2px solid transparent; letter-spacing: .5px;
  }
  .tab:hover { color: var(--text); }
  .tab.on { color: var(--text); border-bottom-color: var(--accent1); font-weight: 600; }
  .drawer-body { overflow-y: auto; padding: 20px 26px 40px; flex: 1; }
  .sec { margin-bottom: 26px; }
  .sec h3 { font-size: 13px; color: var(--muted); letter-spacing: 1px; margin-bottom: 10px; font-weight: 600; }
  .panel { background: rgba(255,255,255,.03); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; }
  .kv { display: flex; gap: 10px; font-size: 12.5px; margin: 4px 0; }
  .kv .k { color: var(--muted); flex: none; min-width: 76px; }
  .prose { font-size: 13px; line-height: 1.8; color: #c6cddc; white-space: pre-wrap; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 500; font-size: 11px; letter-spacing: .5px; padding: 6px 10px; border-bottom: 1px solid var(--line); }
  td { padding: 7px 10px; border-bottom: 1px solid rgba(255,255,255,.045); font-variant-numeric: tabular-nums; vertical-align: top; }
  tr:hover td { background: rgba(255,255,255,.025); }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 6px; white-space: nowrap; }
  .tag.accept, .tag.ok { color: var(--ok); background: rgba(61,220,151,.1); }
  .tag.rewrite, .tag.fail { color: var(--bad); background: rgba(255,107,129,.1); }
  .tag.pass, .tag.blue { color: var(--info); background: rgba(88,166,255,.1); }
  .tag.pending { color: var(--muted); background: rgba(255,255,255,.05); }
  .tag.now { color: var(--warn); background: rgba(245,177,76,.12); }
  .tag.purple { color: #c9a7ff; background: rgba(176,109,255,.12); }

  .clock { margin: 8px 0; }
  .clock .t { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
  .clock .t em { font-style: normal; color: var(--muted); font-size: 11px; }
  .segs { display: flex; gap: 3px; }
  .segs i { flex: 1; height: 7px; border-radius: 3px; background: rgba(255,255,255,.08); }
  .segs i.f { background: linear-gradient(90deg, var(--accent1), var(--accent2)); box-shadow: 0 0 8px rgba(109,141,255,.4); }

  .placechips { display: flex; flex-wrap: wrap; gap: 6px; }
  .placechips span { font-size: 11.5px; padding: 3px 10px; border-radius: 8px; background: rgba(255,255,255,.05); border: 1px solid var(--line); color: #b9c1d4; }

  .tree { font-size: 13px; }
  .tree .vol { margin-bottom: 12px; }
  .tree .vol > b { font-size: 13.5px; }
  .tree .arc { margin: 5px 0 5px 16px; color: #c6cddc; }
  .tree .arc small { color: var(--muted); }

  .log {
    font-family: var(--mono); font-size: 11.5px; line-height: 1.55;
    background: #070910; border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px; max-height: 460px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
    color: #9aa5bd;
  }

  /* Markdown 渲染 */
  .md { font-size: 13.5px; line-height: 1.85; color: #c6cddc; max-height: 480px; overflow-y: auto; }
  .md h1, .md h2, .md h3, .md h4 { color: var(--text); margin: 14px 0 8px; line-height: 1.4; }
  .md h1 { font-size: 17px; } .md h2 { font-size: 15px; border-bottom: 1px solid var(--line); padding-bottom: 5px; }
  .md h3 { font-size: 14px; } .md h4 { font-size: 13px; color: #aab3c9; }
  .md ul, .md ol { padding-left: 22px; margin: 6px 0; }
  .md li { margin: 3px 0; }
  .md p { margin: 7px 0; }
  .md strong { color: var(--text); }
  .md code { font-family: var(--mono); font-size: 12px; background: rgba(255,255,255,.07); padding: 1px 5px; border-radius: 4px; }
  .md blockquote { border-left: 3px solid rgba(109,141,255,.5); padding: 2px 12px; margin: 8px 0; color: var(--muted); }
  .md hr { border: none; border-top: 1px solid var(--line); margin: 12px 0; }

  /* 人物卡 */
  .pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 14px; }
  .pcard { background: rgba(255,255,255,.03); border: 1px solid var(--line); border-radius: 14px; padding: 15px 16px; }
  .pcard .phead { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .pcard .phead b { font-size: 15px; }
  .pcard .role { font-size: 12px; color: var(--muted); }
  .pcard .desc { font-size: 12.5px; color: #b9c1d4; line-height: 1.7; margin-top: 8px; }
  .ocean { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
  .ocean .ax { text-align: center; }
  .ocean .ax .t { height: 44px; display: flex; align-items: flex-end; justify-content: center; }
  .ocean .ax .t i { width: 12px; border-radius: 3px 3px 0 0; background: linear-gradient(180deg, var(--accent2), var(--accent1)); }
  .ocean .ax .l { font-size: 10px; color: var(--muted); margin-top: 4px; }
  .ocean .ax .n { font-size: 10px; color: #aab3c9; font-family: var(--mono); }
  .dna { margin-top: 8px; font-size: 11.5px; }
  .dna .row { display: flex; gap: 6px; margin: 3px 0; align-items: baseline; }
  .dna .lab { flex: none; width: 34px; font-size: 10.5px; color: var(--muted); }
  .statebox { margin-top: 10px; border-top: 1px dashed var(--line); padding-top: 8px; }
  .statebox .kv { margin: 3px 0; font-size: 12px; }
  .statebox .kv .k { min-width: 62px; }

  /* ---- 成长轨迹：人物生命线 ---- */
  .lifeline { background: rgba(255,255,255,.03); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; margin-bottom: 14px; }
  .lifeline .lhead { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .lifeline .lhead b { font-size: 15px; }
  .lifeline .lhead .role { font-size: 11.5px; color: var(--muted); }
  .lifeline .lhead .count { margin-left: auto; font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .track { position: relative; height: 30px; margin: 14px 0 6px; }
  .track .rail { position: absolute; top: 14px; left: 0; right: 0; height: 2px; background: rgba(255,255,255,.08); border-radius: 2px; }
  .track .span { position: absolute; top: 13px; height: 4px; border-radius: 2px; background: linear-gradient(90deg, rgba(109,141,255,.5), rgba(176,109,255,.5)); }
  .track .node { position: absolute; top: 8px; width: 13px; height: 13px; margin-left: -6.5px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #cdd6f4, var(--accent1)); box-shadow: 0 0 8px rgba(109,141,255,.6); cursor: default; }
  .track .node.future { background: rgba(255,255,255,.12); box-shadow: none; border: 1px dashed rgba(245,177,76,.7); }
  .track .now { position: absolute; top: 2px; width: 2px; height: 26px; background: var(--warn); box-shadow: 0 0 8px var(--warn); }
  .track .cax { position: absolute; top: 30px; font-size: 9px; color: var(--muted); transform: translateX(-50%); }
  .phases { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin: 10px 0; }
  .phase { border-radius: 8px; padding: 7px 10px; font-size: 11.5px; line-height: 1.55; border: 1px solid var(--line); }
  .phase .pt { font-size: 10px; letter-spacing: 1px; margin-bottom: 3px; font-weight: 600; }
  .phase.p0 { background: rgba(88,166,255,.06); } .phase.p0 .pt { color: var(--info); }
  .phase.p1 { background: rgba(245,177,76,.06); } .phase.p1 .pt { color: var(--warn); }
  .phase.p2 { background: rgba(61,220,151,.06); } .phase.p2 .pt { color: var(--ok); }
  .facts { font-size: 11.5px; color: #b9c1d4; line-height: 1.6; }
  .facts .f { display: flex; gap: 6px; margin: 2px 0; }
  .facts .f .cb { flex: none; font-family: var(--mono); font-size: 10px; color: var(--accent1); padding-top: 1px; }
  .longarc { margin-top: 8px; font-size: 11.5px; color: var(--muted); border-top: 1px dashed var(--line); padding-top: 7px; }

  /* ---- 决策流 ---- */
  .dfilter { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .dfilter .fb { font-size: 11.5px; padding: 4px 12px; border-radius: 999px; border: 1px solid var(--line); background: none; color: var(--muted); cursor: pointer; }
  .dfilter .fb:hover { color: var(--text); }
  .dfilter .fb.on { color: var(--text); border-color: var(--accent1); background: rgba(109,141,255,.12); }
  .dstream { position: relative; padding-left: 26px; }
  .dstream::before { content: ""; position: absolute; left: 8px; top: 4px; bottom: 4px; width: 2px; background: linear-gradient(var(--accent1), var(--accent2)); opacity: .35; }
  .dnode { position: relative; margin-bottom: 14px; }
  .dnode::before { content: ""; position: absolute; left: -22px; top: 5px; width: 10px; height: 10px; border-radius: 50%; background: var(--accent1); box-shadow: 0 0 8px rgba(109,141,255,.6); }
  .dcard { background: rgba(255,255,255,.03); border: 1px solid var(--line); border-radius: 12px; padding: 11px 14px; }
  .dcard .dh { display: flex; align-items: baseline; gap: 8px; font-size: 12.5px; margin-bottom: 6px; }
  .dcard .dh b { font-size: 13px; }
  .dcard .dh .fld { color: var(--muted); }
  .transit { display: flex; align-items: center; gap: 8px; font-size: 12px; margin: 5px 0; flex-wrap: wrap; }
  .transit .from { color: #9aa5bd; text-decoration: line-through; text-decoration-color: rgba(255,107,129,.5); }
  .transit .arr { color: var(--accent1); flex: none; }
  .transit .to { color: var(--ok); }
  .dcard .why { font-size: 11.5px; color: var(--muted); margin-top: 6px; line-height: 1.6; border-left: 2px solid rgba(245,177,76,.4); padding-left: 9px; }

  /* ---- 环形进度钟（SVG） ---- */
  .clockgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  .clockcard { background: rgba(255,255,255,.03); border: 1px solid var(--line); border-radius: 14px; padding: 14px; display: flex; gap: 12px; align-items: center; }
  .clockcard .ring { flex: none; }
  .clockcard .cbody b { font-size: 13px; display: block; }
  .clockcard .cbody .cmeta { font-size: 10.5px; color: var(--muted); margin: 2px 0; }
  .clockcard .cbody .cons { font-size: 11px; color: #b9c1d4; line-height: 1.5; margin-top: 4px; }
  .log .hl { color: #ffb4c0; }
  .loading { color: var(--muted); font-size: 13px; padding: 30px 0; text-align: center; }
  a { color: var(--accent1); }
</style>
<style id="refined-workbench-theme">
  :root {
    --bg: #f2f5f3;
    --surface: #ffffff;
    --surface-soft: #f7f9f8;
    --surface-strong: #eef2f0;
    --line: #d9e0dc;
    --line-strong: #bcc7c1;
    --text: #202824;
    --muted: #66736d;
    --subtle: #89938e;
    --accent1: #0f766e;
    --accent2: #1d4ed8;
    --ok: #16803a;
    --warn: #b45309;
    --bad: #be123c;
    --info: #1d4ed8;
    --cyan: #0e7490;
    --purple: #6d28d9;
    --shadow: 0 12px 28px rgba(31, 42, 36, .08);
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
  }
  * { letter-spacing: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    min-width: 320px;
  }
  ::selection { background: #ccebe5; color: #143d38; }
  header {
    min-height: 62px;
    padding: 10px max(22px, calc((100vw - 1480px) / 2));
    gap: 12px;
    background: rgba(255, 255, 255, .92);
    border-color: var(--line);
    box-shadow: 0 1px 0 rgba(28, 39, 33, .03);
  }
  .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .brand-mark {
    width: 30px; height: 30px; display: grid; place-items: center;
    color: #fff; background: #163f3a; border-radius: 6px;
    font: 700 11px/1 var(--mono); flex: none;
  }
  .brand-copy { min-width: 0; }
  .brand-copy h1 { font-size: 15px; line-height: 1.25; color: var(--text); }
  .brand-copy p { margin-top: 2px; color: var(--muted); font-size: 11px; }
  h1 em { color: inherit; background: none; -webkit-text-fill-color: currentColor; }
  .logo { display: none; }
  .head-meta { gap: 14px; font-size: 11px; }
  .head-meta code { color: var(--muted); }
  .dot { width: 6px; height: 6px; }
  .dot.live { background: var(--ok); box-shadow: none; animation: none; }
  .dot.err { background: var(--bad); box-shadow: none; }
  .icon-btn {
    width: 32px; height: 32px; display: grid; place-items: center;
    border: 1px solid var(--line); background: var(--surface); color: var(--muted);
    border-radius: 6px; cursor: pointer; font-size: 17px;
  }
  .icon-btn:hover { border-color: var(--line-strong); color: var(--text); }
  .icon-btn:disabled { opacity: .45; cursor: wait; }

  main { max-width: 1480px; padding: 24px 22px 72px; }
  .portfolio {
    background: var(--surface); border: 1px solid var(--line); border-radius: 8px;
    box-shadow: 0 3px 12px rgba(31, 42, 36, .035);
  }
  .portfolio-head {
    display: flex; align-items: flex-end; justify-content: space-between; gap: 20px;
    padding: 17px 18px 14px; border-bottom: 1px solid var(--line);
  }
  .portfolio-head h2 { font-size: 17px; line-height: 1.25; }
  .portfolio-head p { margin-top: 4px; color: var(--muted); font-size: 12px; }
  .scan-meta { color: var(--subtle); font-size: 11px; text-align: right; }
  .portfolio-metrics {
    display: grid; grid-template-columns: repeat(8, minmax(0, 1fr));
  }
  .portfolio-metric { padding: 14px 16px 13px; border-right: 1px solid var(--line); min-width: 0; }
  .portfolio-metric:last-child { border-right: 0; }
  .portfolio-metric .k { color: var(--muted); font-size: 10px; line-height: 1.35; }
  .portfolio-metric .v { margin-top: 4px; font-size: 20px; font-weight: 720; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .portfolio-metric .s { margin-top: 3px; color: var(--subtle); font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .portfolio-metric.attn .v { color: var(--bad); }
  .portfolio-metric.live .v { color: var(--ok); }

  .toolbar {
    display: flex; align-items: center; gap: 10px; margin: 16px 0 10px;
  }
  .search-box { position: relative; width: min(320px, 38vw); }
  .search-box input {
    width: 100%; height: 36px; padding: 0 12px 0 34px;
    border: 1px solid var(--line); border-radius: 6px; background: var(--surface);
    color: var(--text); outline: none; font: inherit; font-size: 12px;
  }
  .search-box input:focus { border-color: var(--accent1); box-shadow: 0 0 0 3px rgba(15, 118, 110, .1); }
  .search-box span { position: absolute; left: 12px; top: 9px; color: var(--subtle); font-size: 14px; pointer-events: none; }
  .segmented { display: inline-flex; height: 36px; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; background: var(--surface); }
  .segmented button {
    min-width: 66px; padding: 0 12px; border: 0; border-right: 1px solid var(--line);
    background: transparent; color: var(--muted); cursor: pointer; font-size: 11px;
  }
  .segmented button:last-child { border-right: 0; }
  .segmented button.on { background: #e9f4f1; color: #0c5f58; font-weight: 650; }
  .toolbar select {
    height: 36px; padding: 0 30px 0 10px; border: 1px solid var(--line); border-radius: 6px;
    background: var(--surface); color: var(--text); font-size: 11px;
  }
  .result-count { margin-left: auto; color: var(--muted); font-size: 11px; }

  .grid, .project-list { display: grid; grid-template-columns: 1fr; gap: 10px; }
  .project-card {
    position: relative; background: var(--surface); border: 1px solid var(--line); border-radius: 8px;
    cursor: pointer; overflow: hidden; transition: border-color .16s ease, box-shadow .16s ease;
  }
  .project-card:hover { border-color: #aab8b1; box-shadow: var(--shadow); transform: none; }
  .project-card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #aeb8b3; }
  .project-card.status-running::before { background: var(--ok); }
  .project-card.status-error::before, .project-card.status-attention::before { background: var(--bad); }
  .project-top {
    min-height: 58px; display: flex; align-items: center; gap: 16px;
    padding: 11px 14px 10px 18px; border-bottom: 1px solid var(--line);
  }
  .project-identity { min-width: 220px; flex: 1; }
  .project-name-row { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .project-name-row h2 { font-size: 15px; line-height: 1.3; overflow-wrap: anywhere; }
  .project-sub { margin-top: 4px; color: var(--subtle); font-size: 10px; font-family: var(--mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .project-badges { display: flex; align-items: center; flex-wrap: wrap; justify-content: flex-end; gap: 5px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #9aa5a0; flex: none; }
  .status-dot.running { background: var(--ok); box-shadow: 0 0 0 3px rgba(22, 128, 58, .11); animation: breathe 1.8s ease-in-out infinite; }
  .status-dot.error, .status-dot.attention { background: var(--bad); }
  .open-detail { display: grid; place-items: center; border: 0; background: transparent; color: var(--muted); width: 30px; height: 30px; font-size: 18px; flex: none; }
  .open-detail:hover { color: var(--text); }
  .pill, .tag {
    border-radius: 4px; letter-spacing: 0; border: 1px solid transparent; font-weight: 520;
  }
  .pill { padding: 3px 7px; }
  .pill.phase-writing { color: #8a4305; border-color: #f0d5ad; background: #fff8eb; }
  .pill.phase-complete, .tag.accept, .tag.ok { color: #11642e; border-color: #bfdfca; background: #f0f8f2; }
  .pill.phase-outline, .tag.blue, .tag.pass { color: #164ca1; border-color: #c9d8f1; background: #f2f6fd; }
  .pill.gen, .tag.purple { color: #5b21a8; border-color: #ddcef1; background: #f8f5fc; }
  .tag.rewrite, .tag.fail { color: #9f1239; border-color: #f0c6d3; background: #fff3f6; }
  .tag.now { color: #8a4305; border-color: #efd4ac; background: #fff8eb; }
  .tag.pending { color: var(--muted); border-color: var(--line); background: var(--surface-soft); }
  .tag.health-ok { color: #11642e; border-color: #bfdfca; background: #f0f8f2; }
  .tag.health-warning { color: #8a4305; border-color: #efd4ac; background: #fff8eb; }
  .tag.health-error { color: #9f1239; border-color: #f0c6d3; background: #fff3f6; }

  .project-body { display: grid; grid-template-columns: minmax(300px, 1.15fr) minmax(360px, 1.5fr) minmax(320px, 1.15fr); }
  .project-section { padding: 14px 18px 13px; min-width: 0; border-right: 1px solid var(--line); }
  .project-section:last-child { border-right: 0; }
  .section-kicker { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; color: var(--muted); font-size: 10px; }
  .section-kicker b { color: var(--text); font-size: 12px; }
  .progress-line { display: grid; grid-template-columns: 78px 1fr 104px; align-items: center; gap: 8px; margin-top: 9px; font-size: 10px; color: var(--muted); }
  .progress-line strong { color: var(--text); font-size: 10px; text-align: right; font-variant-numeric: tabular-nums; }
  .trackbar { height: 5px; background: var(--surface-strong); overflow: hidden; border-radius: 3px; }
  .trackbar i { display: block; height: 100%; background: var(--accent1); border-radius: 3px; box-shadow: none; transition: width .35s ease; }
  .progress-line.plan .trackbar i { background: var(--info); }
  .progress-line.quality .trackbar i { background: var(--warn); }
  .progress-facts { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 11px; color: var(--muted); font-size: 10px; }
  .progress-facts b { color: var(--text); font-variant-numeric: tabular-nums; }

  .current-title { margin-top: 5px; display: flex; align-items: baseline; gap: 8px; min-width: 0; }
  .current-title b { font-size: 14px; }
  .current-title span { color: var(--muted); font-size: 10px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .steps { margin-top: 11px; gap: 3px; }
  .steps .lbl { display: none; }
  .step { padding: 4px 2px; font-size: 9px; border-radius: 3px; background: var(--surface-strong); }
  .step.done { color: #11642e; background: #eaf5ee; }
  .step.now { color: #7a3b05; background: #fff3df; border-color: #e5bd82; animation: none; }
  .latest-event { margin-top: 9px; color: var(--muted); font-size: 10px; line-height: 1.45; overflow-wrap: anywhere; }
  .latest-event b { color: var(--text); font-weight: 620; }
  .runtime-error { margin-top: 8px; padding-left: 8px; border-left: 2px solid var(--bad); color: #8c2742; font-size: 10px; line-height: 1.45; }
  .runtime-error.recovered { border-left-color: var(--warn); color: #78501f; }

  .quality-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 9px; }
  .quality-metric .v { font-size: 15px; font-weight: 720; font-variant-numeric: tabular-nums; }
  .quality-metric .k { color: var(--muted); font-size: 9px; margin-top: 2px; }
  .quality-note { margin-top: 10px; color: var(--muted); font-size: 10px; line-height: 1.5; }
  .quality-note strong { color: var(--text); }
  .project-footer {
    display: flex; align-items: center; flex-wrap: wrap; gap: 14px;
    min-height: 34px; padding: 7px 14px 7px 18px; border-top: 1px solid var(--line);
    background: var(--surface-soft); color: var(--muted); font-size: 10px;
  }
  .project-footer b { color: var(--text); font-weight: 620; }
  .project-footer .updated { margin-left: auto; }
  .empty { padding: 70px 18px; background: var(--surface); border: 1px solid var(--line); border-radius: 8px; }

  .overlay { background: rgba(21, 30, 26, .32); backdrop-filter: blur(2px); }
  .drawer {
    width: min(1240px, 97vw); background: var(--surface); border-color: var(--line);
    box-shadow: -18px 0 48px rgba(25, 34, 29, .14);
  }
  .drawer-head { padding: 14px 22px 0; background: var(--surface); border-color: var(--line); }
  .drawer-head h2 { font-size: 18px; }
  .drawer-head .close { border-color: var(--line); color: var(--muted); border-radius: 6px; }
  .tabs { overflow-x: auto; margin-top: 10px; scrollbar-width: thin; }
  .tab { padding: 9px 13px; color: var(--muted); white-space: nowrap; font-size: 12px; }
  .tab.on { color: #0d5f58; border-bottom-color: var(--accent1); }
  .drawer-body { padding: 18px 22px 46px; }
  .sec { margin-bottom: 22px; }
  .sec h3 { margin-bottom: 8px; color: #4f5d56; font-size: 11px; font-weight: 700; }
  .panel, .pcard, .lifeline, .dcard, .clockcard, .log {
    background: var(--surface-soft); border-color: var(--line); border-radius: 6px;
  }
  .panel { padding: 13px 14px; }
  .prose, .md, .pcard .desc, .facts, .clockcard .cbody .cons { color: #46544d; }
  .detail-kpis { display: grid; grid-template-columns: repeat(6, 1fr); border: 1px solid var(--line); border-radius: 6px; margin-bottom: 18px; }
  .detail-kpi { padding: 11px 12px; border-right: 1px solid var(--line); }
  .detail-kpi:last-child { border-right: 0; }
  .detail-kpi .k { color: var(--muted); font-size: 9px; }
  .detail-kpi .v { margin-top: 3px; font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .health-list { display: grid; gap: 6px; margin-top: 9px; }
  .health-item { display: flex; gap: 8px; align-items: flex-start; color: #48554e; font-size: 11px; line-height: 1.55; }
  .health-item::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--warn); margin-top: 5px; flex: none; }
  .health-item.error::before { background: var(--bad); }
  .source-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 6px; margin-top: 10px; }
  .source-item { padding: 7px 9px; background: var(--surface); border: 1px solid var(--line); border-radius: 4px; min-width: 0; }
  .source-item b { display: block; font-size: 10px; }
  .source-item span { display: block; margin-top: 2px; color: var(--subtle); font: 9px/1.35 var(--mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .asset-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 6px; }
  .asset-item { display: flex; align-items: center; gap: 7px; min-width: 0; padding: 7px 9px; border: 1px solid var(--line); border-radius: 4px; background: var(--surface-soft); font-size: 10px; }
  .asset-item i { width: 7px; height: 7px; border-radius: 50%; background: var(--bad); flex: none; }
  .asset-item.ok i { background: var(--ok); }
  .asset-item span { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .asset-item code { margin-left: auto; color: var(--subtle); font-size: 8px; }
  table { font-size: 11px; }
  th { color: var(--muted); padding: 7px 8px; background: var(--surface-soft); position: sticky; top: 0; z-index: 1; }
  td { padding: 7px 8px; border-color: #e7ebe9; }
  tr:hover td { background: #f7faf8; }
  .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 6px; }
  .table-wrap table { min-width: 720px; }
  .pgrid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 8px; }
  .pcard { padding: 13px 14px; }
  .character-details { margin-top: 9px; border-top: 1px solid var(--line); padding-top: 8px; }
  details summary { cursor: pointer; color: var(--muted); font-size: 10px; }
  details[open] summary { color: var(--text); margin-bottom: 7px; }
  .route-time { font-family: var(--mono); white-space: nowrap; }
  .journey-list { display: grid; gap: 7px; }
  .journey-row { display: grid; grid-template-columns: 110px 150px minmax(180px, 1fr) minmax(220px, 1.35fr); gap: 10px; padding: 10px 11px; border: 1px solid var(--line); border-radius: 5px; background: var(--surface-soft); font-size: 10px; line-height: 1.5; }
  .journey-row b { font-size: 11px; }
  .journey-row .muted { color: var(--muted); }
  .quality-chapter { margin-bottom: 10px; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .quality-chapter-head { display: flex; align-items: center; gap: 7px; padding: 10px 12px; background: var(--surface-soft); border-bottom: 1px solid var(--line); }
  .quality-chapter-head b { font-size: 12px; }
  .quality-chapter-head .spacer { margin-left: auto; }
  .quality-chapter-body { padding: 11px 12px; }
  .quality-summary-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 10px; }
  .quality-summary-grid .cell { padding-right: 8px; border-right: 1px solid var(--line); }
  .quality-summary-grid .cell:last-child { border-right: 0; }
  .quality-summary-grid .cell b { display: block; font-size: 13px; }
  .quality-summary-grid .cell span { color: var(--muted); font-size: 9px; }
  .event-list { border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .event-row { display: grid; grid-template-columns: 132px 72px 74px minmax(260px, 1fr); gap: 8px; padding: 7px 9px; border-bottom: 1px solid var(--line); font-size: 10px; align-items: baseline; }
  .event-row:last-child { border-bottom: 0; }
  .event-row.failed { background: #fff5f7; color: #8f2643; }
  .event-row time { color: var(--subtle); font-family: var(--mono); }
  .log { background: #18201c; color: #c2cec8; border-color: #26352d; border-radius: 6px; }
  .log .hl { color: #ff9aae; }
  .clockcard, .lifeline { padding: 13px 14px; }
  .segs i.f, .ocean .ax .t i, .track .span, .dstream::before { background: var(--accent1); box-shadow: none; }
  .track .node { background: var(--accent2); box-shadow: none; }
  .ring text { fill: var(--text); }
  .loading { color: var(--muted); }

  @media (max-width: 1120px) {
    .portfolio-metrics { grid-template-columns: repeat(4, 1fr); }
    .portfolio-metric:nth-child(4n) { border-right: 0; }
    .portfolio-metric:nth-child(-n+4) { border-bottom: 1px solid var(--line); }
    .project-body { grid-template-columns: 1fr 1fr; }
    .project-section:nth-child(2) { border-right: 0; }
    .project-section:last-child { grid-column: 1 / -1; border-top: 1px solid var(--line); }
    .detail-kpis { grid-template-columns: repeat(3, 1fr); }
    .detail-kpi:nth-child(3) { border-right: 0; }
    .detail-kpi:nth-child(-n+3) { border-bottom: 1px solid var(--line); }
  }
  @media (max-width: 760px) {
    header { padding: 9px 12px; }
    .head-meta #runs-source-wrap, .head-meta #tick { display: none; }
    .brand-copy p { display: none; }
    main { padding: 14px 10px 50px; }
    .portfolio-head { align-items: flex-start; padding: 14px; }
    .scan-meta { display: none; }
    .portfolio-metrics { grid-template-columns: repeat(2, 1fr); }
    .portfolio-metric { border-bottom: 1px solid var(--line); }
    .portfolio-metric:nth-child(2n) { border-right: 0; }
    .portfolio-metric:nth-last-child(-n+2) { border-bottom: 0; }
    .toolbar { flex-wrap: wrap; }
    .search-box { width: 100%; }
    .segmented { width: 100%; }
    .segmented button { flex: 1; min-width: 0; padding: 0 5px; }
    .toolbar select { flex: 1; }
    .result-count { margin-left: 0; }
    .project-top { align-items: flex-start; padding: 11px 10px 10px 14px; }
    .project-badges { display: none; }
    .project-body { grid-template-columns: 1fr; }
    .project-section, .project-section:nth-child(2), .project-section:last-child { border-right: 0; border-top: 1px solid var(--line); grid-column: auto; }
    .project-section:first-child { border-top: 0; }
    .project-footer { gap: 8px; padding-left: 14px; }
    .project-footer .updated { width: 100%; margin-left: 0; }
    .drawer { width: 100vw; }
    .drawer-head { padding: 12px 12px 0; }
    .drawer-body { padding: 14px 10px 36px; }
    .tabs { margin-right: -12px; }
    .detail-kpis { grid-template-columns: repeat(2, 1fr); }
    .detail-kpi, .detail-kpi:nth-child(3) { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); }
    .detail-kpi:nth-child(2n) { border-right: 0; }
    .detail-kpi:nth-last-child(-n+2) { border-bottom: 0; }
    .pgrid { grid-template-columns: 1fr; }
    .journey-row { grid-template-columns: 1fr; gap: 4px; }
    .quality-summary-grid { grid-template-columns: repeat(2, 1fr); }
    .quality-summary-grid .cell { border-right: 0; border-bottom: 1px solid var(--line); padding-bottom: 6px; }
    .event-row { grid-template-columns: 100px 62px 1fr; }
    .event-row span:last-child { grid-column: 1 / -1; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="brand-mark">NS</div>
    <div class="brand-copy">
      <h1>novel-studio</h1>
      <p>创作进度控制台</p>
    </div>
  </div>
  <div class="head-meta">
    <span id="conn"><span class="dot live"></span><span>已连接</span></span>
    <span id="runs-source-wrap">数据源 <code id="runs-dir">data/runs/</code></span>
    <span id="tick">—</span>
    <button class="icon-btn" id="manual-refresh" type="button" title="立即刷新" aria-label="立即刷新">↻</button>
  </div>
</header>

<main>
  <section class="portfolio" aria-labelledby="portfolio-title">
    <div class="portfolio-head">
      <div>
        <h2 id="portfolio-title">创作全局</h2>
        <p>正文、评审、运行队列与沉淀资产的实时汇总</p>
      </div>
      <div class="scan-meta" id="scan-meta">等待首次扫描</div>
    </div>
    <div class="portfolio-metrics" id="portfolio-metrics"></div>
  </section>

  <div class="toolbar">
    <label class="search-box">
      <span aria-hidden="true">⌕</span>
      <input id="project-search" type="search" placeholder="搜索书名、目录、模型" autocomplete="off">
    </label>
    <div class="segmented" id="project-filter" aria-label="项目状态筛选">
      <button type="button" class="on" data-filter="all">全部</button>
      <button type="button" data-filter="running">运行中</button>
      <button type="button" data-filter="attention">待处理</button>
      <button type="button" data-filter="idle">空闲</button>
    </div>
    <select id="project-sort" aria-label="项目排序">
      <option value="activity">按最近活动</option>
      <option value="attention">按待处理优先</option>
      <option value="progress">按完成进度</option>
      <option value="name">按书名</option>
    </select>
    <span class="result-count" id="result-count">0 个项目</span>
  </div>

  <div class="project-list" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <b>还没有书目工程</b>
    在 <code>data/runs/&lt;书名&gt;/</code> 下用 <code>novel-studio --pipeline</code> 开一本书，这里会自动出现它的进度。
  </div>
</main>

<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head">
    <div class="row">
      <h2 id="d-title">—</h2>
      <span class="pill" id="d-phase"></span>
      <button class="close" id="d-close">✕</button>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab on" data-tab="overview">总览</button>
      <button class="tab" data-tab="setting">设定</button>
      <button class="tab" data-tab="cast">人物</button>
      <button class="tab" data-tab="growth">成长轨迹</button>
      <button class="tab" data-tab="plan">计划</button>
      <button class="tab" data-tab="offscreen">离屏世界</button>
      <button class="tab" data-tab="quality">质量</button>
      <button class="tab" data-tab="log">运行</button>
    </div>
  </div>
  <div class="drawer-body" id="d-body"><div class="loading">加载中…</div></div>
</aside>

<script>
"use strict";
const $ = (s, el = document) => el.querySelector(s);
const grid = $("#grid"), empty = $("#empty");
const overlay = $("#overlay"), drawer = $("#drawer");
let currentDetail = null, currentTab = "overview", detailTimer = null;
let allNovels = [], activeFilter = "all", refreshing = false;

const fmtNum = n => (n >= 10000 ? (n / 10000).toFixed(1) + " 万" : String(n ?? 0));
const fmtMoney = n => "$" + (n ?? 0).toFixed(2);
const phaseName = { init: "初始化", premise: "前提设计", outline: "大纲规划", writing: "写作中", complete: "已完结", unknown: "未知" };
const stepName = { rag: "RAG 重建", simulate: "推演", plan: "计划", draft: "落稿", check: "校验", commit: "提交", review: "评审", rewrite: "返工", deliver: "交付" };
const stageName = { "rag-build": "RAG 重建", foundation: "基础冻结", "outline-all": "全书分层大纲", preplan: "弧规划准备", "project-all": "正式弧推演规划", seal: "弧规划封存", render: "正文渲染" };
const runtimeName = { running: "运行中", error: "运行异常", attention: "待处理", idle: "空闲", complete: "已完结" };
const healthName = { ok: "数据一致", warning: "有差异", error: "数据冲突" };
const ago = ts => {
  if (!ts) return "—";
  const s = Math.max(0, Date.now() / 1000 - ts);
  if (s < 60) return Math.floor(s) + " 秒前";
  if (s < 3600) return Math.floor(s / 60) + " 分钟前";
  if (s < 86400) return Math.floor(s / 3600) + " 小时前";
  return Math.floor(s / 86400) + " 天前";
};
const pct = n => Math.max(0, Math.min(100, Number(n) || 0));
const chapterText = (n, empty = "尚未进入正文") => Number(n) > 0 ? `第 ${Number(n)} 章` : empty;
const shortTime = value => value ? new Date(value).toLocaleString("zh-CN", { hour12: false, month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", second: "2-digit" }) : "—";
const travelTime = days => {
  if (days == null || Number.isNaN(Number(days))) return "—";
  const minutes = Math.round(Number(days) * 24 * 60);
  if (minutes < 60) return `${minutes} 分钟`;
  if (minutes < 24 * 60) return `${(minutes / 60).toFixed(minutes % 60 ? 1 : 0)} 小时`;
  return `${Number(days).toFixed(1)} 天`;
};
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const api = p => fetch(p, { cache: "no-store" }).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });

/* ---------- 项目列表 ---------- */
function stepChain(w, compact) {
  if (!w || !w.chapter) return "";
  const chain = (w.chain || []).map((s, i) => {
    let cls = "";
    if (w.chain_pos >= 0) { if (i < w.chain_pos) cls = "done"; else if (i === w.chain_pos) cls = "now"; }
    return `<span class="step ${cls}">${stepName[s] || s}</span>`;
  }).join("");
  return `<div class="steps"><span class="lbl">第 ${w.chapter} 章${compact ? "" : " 进展"}</span>${chain}</div>`;
}

function card(b) {
  const runtime = b.runtime || {}, health = b.health || {}, w = b.working || {};
  const formal = b.formal_planning || {};
  const status = runtime.status || (b.active ? "running" : "idle");
  const workLabel = w.mode === "rag" ? "RAG 重建" : w.mode === "planning" ? (stageName[runtime.current_stage] || "规划阶段") : w.mode === "rewrite" ? `返工第 ${w.chapter} 章` : chapterText(w.chapter, "尚未进入章节");
  const latest = w.last_step || (runtime.last_event || {}).summary || "等待下一步";
  const err = w.last_error || runtime.last_error;
  const errRecovered = err && w.last_at && new Date(w.last_at).getTime() > new Date(err.time || 0).getTime() && !w.last_failed;
  const target = b.chapter_word_target || {};
  const targetText = target.min || target.max ? `${target.min || "?"}–${target.max || "?"}` : "未设置";
  const healthCls = `health-${health.status || "warning"}`;
  const model = runtime.model || "模型未记录";
  return `<article class="project-card status-${esc(status)}" data-dir="${esc(b.dir)}" tabindex="0" role="button" aria-label="查看 ${esc(b.name)} 详情">
    <div class="project-top">
      <div class="project-identity">
        <div class="project-name-row"><span class="status-dot ${esc(status)}"></span><h2>${esc(b.name)}</h2></div>
        <div class="project-sub">${esc(b.dir)} · ${esc(b.generation_id || "无 generation id")}</div>
      </div>
      <div class="project-badges">
        <span class="pill phase-${esc(b.phase)}">${phaseName[b.phase] || esc(b.phase)}</span>
        <span class="tag ${status === "running" ? "ok" : status === "error" || status === "attention" ? "rewrite" : "pending"}">${runtimeName[status] || esc(status)}</span>
        <span class="tag ${healthCls}">${healthName[health.status] || "待校验"}</span>
        ${b.archived ? '<span class="tag pending">历史工程</span>' : ""}
        ${b.rewrite_pending ? `<span class="tag rewrite">${b.rewrite_pending} 章待返工</span>` : ""}
      </div>
      <span class="open-detail" aria-hidden="true">›</span>
    </div>
    <div class="project-body">
      <section class="project-section">
        <div class="section-kicker"><span>全书进度</span><b>${b.chapters_completed} / ${b.chapters_total || "?"} 章</b></div>
        <div class="progress-line"><span>已归档</span><span class="trackbar"><i style="width:${pct(b.progress_percent)}%"></i></span><strong>${pct(b.progress_percent).toFixed(1)}%</strong></div>
        <div class="progress-line plan"><span>冻结分层大纲</span><span class="trackbar"><i style="width:${pct(b.outline_percent)}%"></i></span><strong>${pct(b.outline_percent).toFixed(1)}%</strong></div>
        <div class="progress-line plan"><span>正式弧规划</span><span class="trackbar"><i style="width:${pct(formal.percent)}%"></i></span><strong>${esc(formal.label || "未开始")} · ${formal.planned_chapters || 0}/${formal.expected_chapters || "?"}</strong></div>
        <div class="progress-line quality"><span>质检通过</span><span class="trackbar"><i style="width:${pct(b.quality_percent)}%"></i></span><strong>${b.reviews_accepted}/${b.chapters_on_disk}</strong></div>
        <div class="progress-facts"><span>正文游标 <b>${chapterText(b.current_chapter)}</b></span><span>卷/弧 <b>${b.volume || "-"}/${b.arc || "-"}</b></span><span>落盘 <b>${b.chapters_on_disk}</b></span><span>分层大纲 <b>${b.chapters_outlined || 0}</b></span></div>
      </section>
      <section class="project-section">
        <div class="section-kicker"><span>当前执行</span><b>${runtimeName[status] || esc(status)}</b></div>
        <div class="current-title"><b>${workLabel}</b><span>${w.mode === "planning" ? esc(stageName[runtime.current_stage] || runtime.current_stage || "规划") : w.step ? stepName[w.step] || esc(w.step) : "等待 pipeline 动作"}</span></div>
        ${w.mode === "rag" ? '<div class="latest-event">正在重建项目检索索引，不推进正文章号。</div>' : w.mode === "planning" ? '<div class="latest-event">当前处理规划资产，不代表正文章号已经开始。</div>' : stepChain(w, true)}
        <div class="latest-event"><b>${esc(latest)}</b>${w.last_agent ? ` · ${esc(w.last_agent)}` : ""} · ${shortTime(w.last_at)}</div>
        ${err && (runtime.active || status === "error") ? `<div class="runtime-error ${errRecovered ? "recovered" : ""}">${errRecovered ? "近期错误后已继续：" : "当前错误："}${esc(err.summary || err.detail)}</div>` : ""}
      </section>
      <section class="project-section">
        <div class="section-kicker"><span>质量与产出</span><b>${fmtNum(b.words_total)} 字</b></div>
        <div class="quality-grid">
          <div class="quality-metric"><div class="v">${b.reviews_accepted}/${b.reviews_total}</div><div class="k">评审通过</div></div>
          <div class="quality-metric"><div class="v">${b.gate_passed}/${b.gate_total}</div><div class="k">AI 门禁</div></div>
          <div class="quality-metric"><div class="v">${b.rewritten_count}</div><div class="k">已返工章</div></div>
          <div class="quality-metric"><div class="v">${fmtNum(b.average_chapter_words)}</div><div class="k">章均字数</div></div>
          <div class="quality-metric"><div class="v">${targetText}</div><div class="k">字数契约</div></div>
          <div class="quality-metric"><div class="v">${b.assets_ready}/${b.assets_total}</div><div class="k">核心资产</div></div>
        </div>
        <div class="quality-note">${b.rewrite_reason ? `<strong>返工原因：</strong>${esc(b.rewrite_reason)}` : `pipeline ${esc((b.pipeline_stages || []).join(" → ") || "未记录")} · RAG ${fmtNum(b.rag_chunks)} chunks`}</div>
      </section>
    </div>
    <footer class="project-footer">
      <span>模型 <b>${esc(model)}</b>${runtime.planning_tier ? ` · ${esc(runtime.planning_tier)}` : ""}</span>
      <span>输入/输出 <b>${fmtNum(b.tokens_in)} / ${fmtNum(b.tokens_out)}</b></span>
      <span>成本 <b>${fmtMoney(b.cost_usd)}</b></span>
      <span>RAG <b>${fmtNum(b.rag_chunks)}</b></span>
      ${b.generation_mode ? `<span>模式 <b>${esc(b.generation_mode.replace(/_/g, " "))}</b></span>` : ""}
      <span class="updated">更新 ${ago(b.updated_at)}</span>
    </footer>
  </article>`;
}

function renderPortfolio(novels) {
  const sum = key => novels.reduce((n, x) => n + Number(x[key] || 0), 0);
  const running = novels.filter(n => ["running", "error"].includes((n.runtime || {}).status)).length;
  const attention = novels.filter(n => ["error", "attention"].includes((n.runtime || {}).status) || n.rewrite_pending || (n.health || {}).status === "error").length;
  const issues = novels.reduce((n, x) => n + ((x.health || {}).issues || []).length, 0);
  const metrics = [
    ["项目", novels.length, `${sum("chapters_total")} 章总目标`, ""],
    ["正在执行", running, running ? "运行队列持续更新" : "当前无活跃任务", "live"],
    ["待处理", attention, `${sum("rewrite_pending")} 章返工队列`, attention ? "attn" : ""],
    ["已归档章节", sum("chapters_completed"), `${sum("chapters_on_disk")} 章正文落盘`, ""],
    ["评审通过", sum("reviews_accepted"), `${sum("gate_passed")} 章通过 AI 门禁`, ""],
    ["正文实算", fmtNum(sum("words_total")), `${fmtNum(sum("tokens_out"))} 输出 tokens`, ""],
    ["累计成本", fmtMoney(sum("cost_usd")), `缓存节省 ${fmtMoney(sum("saved_usd"))}`, ""],
    ["数据差异", issues, issues ? "展开项目查看明细" : "进度与正文一致", issues ? "attn" : ""],
  ];
  $("#portfolio-metrics").innerHTML = metrics.map(([k, v, s, cls]) => `<div class="portfolio-metric ${cls}"><div class="k">${k}</div><div class="v">${v}</div><div class="s">${s}</div></div>`).join("");
}

function isAttention(n) {
  const status = (n.runtime || {}).status;
  return status === "error" || status === "attention" || n.rewrite_pending > 0 || (n.health || {}).status !== "ok";
}

function applyView() {
  const q = $("#project-search").value.trim().toLowerCase();
  let list = allNovels.filter(n => {
    const status = (n.runtime || {}).status || "idle";
    const matchesFilter = activeFilter === "all" || (activeFilter === "running" && ["running", "error"].includes(status)) || (activeFilter === "attention" && isAttention(n)) || (activeFilter === "idle" && ["idle", "complete"].includes(status));
    const haystack = [n.name, n.dir, (n.runtime || {}).model, n.generation_mode].join(" ").toLowerCase();
    return matchesFilter && (!q || haystack.includes(q));
  });
  const sort = $("#project-sort").value;
  if (sort === "name") list.sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));
  else if (sort === "progress") list.sort((a, b) => b.progress_percent - a.progress_percent || b.updated_at - a.updated_at);
  else if (sort === "attention") list.sort((a, b) => Number(isAttention(b)) - Number(isAttention(a)) || b.updated_at - a.updated_at);
  else list.sort((a, b) => b.updated_at - a.updated_at);
  list.sort((a, b) => Number(Boolean(a.archived)) - Number(Boolean(b.archived)));
  empty.style.display = allNovels.length ? "none" : "";
  grid.innerHTML = list.map(card).join("");
  $("#result-count").textContent = `${list.length} / ${allNovels.length} 个项目`;
  grid.querySelectorAll(".project-card").forEach(el => {
    el.addEventListener("click", () => openDetail(el.dataset.dir));
    el.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openDetail(el.dataset.dir); } });
  });
}

function render(novels) {
  allNovels = novels;
  renderPortfolio(novels);
  applyView();
  const running = novels.filter(n => ["running", "error"].includes((n.runtime || {}).status)).length;
  document.title = (running ? `${running} 本执行中 · ` : "") + "novel-studio · 创作进度看板";
}

async function refresh() {
  if (refreshing) return;
  refreshing = true;
  $("#manual-refresh").disabled = true;
  try {
    const data = await api("/api/novels");
    $("#runs-dir").textContent = data.runs_dir || "data/runs/";
    render(data.novels || []);
    $("#conn").innerHTML = '<span class="dot live"></span>实时刷新';
    $("#scan-meta").textContent = `每 4 秒扫描 · 最近 ${new Date().toLocaleTimeString("zh-CN", { hour12: false })}`;
  } catch {
    $("#conn").innerHTML = '<span class="dot err"></span>连接断开，重试中…';
  } finally {
    refreshing = false;
    $("#manual-refresh").disabled = false;
  }
  $("#tick").textContent = new Date().toLocaleTimeString("zh-CN", { hour12: false });
}

$("#project-search").addEventListener("input", applyView);
$("#project-sort").addEventListener("change", applyView);
$("#project-filter").addEventListener("click", e => {
  const btn = e.target.closest("button[data-filter]");
  if (!btn) return;
  activeFilter = btn.dataset.filter;
  $("#project-filter").querySelectorAll("button").forEach(x => x.classList.toggle("on", x === btn));
  applyView();
});
$("#manual-refresh").addEventListener("click", refresh);

/* ---------- Markdown 渲染（轻量：标题/列表/粗体/代码/引用/分隔线） ---------- */
function mdToHtml(src) {
  const lines = esc(src || "").split("\n");
  const out = [];
  let list = null; // "ul" | "ol"
  const closeList = () => { if (list) { out.push(`</${list}>`); list = null; } };
  const inline = s => s
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/`([^`]+)`/g, "<code>$1</code>");
  for (const raw of lines) {
    const line = raw.replace(/\s+$/, "");
    const h = line.match(/^(#{1,4})\s+(.*)/);
    if (h) { closeList(); out.push(`<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`); continue; }
    if (/^(---+|\*\*\*+)$/.test(line.trim())) { closeList(); out.push("<hr>"); continue; }
    const q = line.match(/^>\s?(.*)/);
    if (q) { closeList(); out.push(`<blockquote>${inline(q[1])}</blockquote>`); continue; }
    const ul = line.match(/^\s*[-*]\s+(.*)/);
    if (ul) { if (list !== "ul") { closeList(); out.push("<ul>"); list = "ul"; } out.push(`<li>${inline(ul[1])}</li>`); continue; }
    const ol = line.match(/^\s*\d+[.、]\s+(.*)/);
    if (ol) { if (list !== "ol") { closeList(); out.push("<ol>"); list = "ol"; } out.push(`<li>${inline(ol[1])}</li>`); continue; }
    closeList();
    if (line.trim()) out.push(`<p>${inline(line)}</p>`);
  }
  closeList();
  return out.join("\n");
}

/* ---------- 页签渲染 ---------- */
const verdictTag = v => v === "accept" ? '<span class="tag accept">通过</span>'
  : v ? `<span class="tag rewrite">${esc(v)}</span>` : '<span class="tag pending">待审</span>';

function renderOverview(d) {
  const w = d.working || {};
  const runtime = d.runtime || {}, health = d.health || {}, assets = d.assets || {}, pos = d.position || {};
  const planned = new Map((d.planned || []).map(p => [p.chapter, p]));
  const disk = new Map((d.chapters || []).map(c => [c.n, c]));
  const nums = [...new Set([...planned.keys(), ...disk.keys()])].sort((a, b) => a - b);
  const rows = nums.map(n => {
    const p = planned.get(n), c = disk.get(n);
    let status;
    if (c && c.rewrite_pending) status = '<span class="tag rewrite">待返工</span>';
    else if (c && c.verdict === "accept") status = '<span class="tag accept">已完成</span>';
    else if (c) status = '<span class="tag blue">已落盘</span>';
    else if (n === w.chapter && runtime.active) status = `<span class="tag now">${w.mode === "rewrite" ? "返工中" : "写作中"} · ${stepName[w.step] || w.step || "…"}</span>`;
    else if (n === w.chapter) status = `<span class="tag now">${w.mode === "rewrite" ? "待返工" : "当前章"}</span>`;
    else status = '<span class="tag pending">未开始</span>';
    let rework = "—";
    if (c && c.rewrite_pending) rework = `<span class="tag rewrite">待返工${c.rewrite_rounds > 1 ? " · 第" + c.rewrite_rounds + "轮" : ""}</span>`;
    else if (c && c.rewritten) rework = `<span class="tag now">已返工 ${c.rewrite_rounds || 1} 轮</span>`;
    else if (c && c.verdict === "accept") rework = '<span class="tag ok">一稿通过</span>';
    return `<tr>
      <td>第 ${n} 章</td>
      <td>${esc((c && c.title) || (p && p.title) || "")}${!c && p && p.core_event ? `<br><small style="color:var(--muted)">${esc(p.core_event)}</small>` : ""}</td>
      <td>${c && c.words ? c.words + " 字" : "—"}</td>
      <td>${status}</td>
      <td>${c ? verdictTag(c.verdict) : "—"}</td>
      <td>${rework}</td>
      <td>${c && c.gate ? `<span class="tag ${esc(c.gate)}">${c.gate === "pass" ? "门禁 ✓" : "门禁 ✗"}${c.gate_warnings ? ` · ${c.gate_warnings} 警告` : ""}</span>` : "—"}</td>
    </tr>`;
  }).join("");
  const agentRows = (d.per_agent || []).map(a => `<tr>
    <td>${esc(a.agent)}</td><td>${fmtNum(a.input)}</td><td>${fmtNum(a.output)}</td><td>${fmtMoney(a.cost_usd)}</td>
  </tr>`).join("");
  const healthIssues = (health.issues || []).map(i => `<div class="health-item ${i.level === "error" ? "error" : ""}">${esc(i.message)}</div>`).join("");
  const sources = (health.sources || []).map(s => `<div class="source-item"><b>${esc(s.label)}</b><span title="${esc(s.path)}">${esc(s.path)} · ${ago(s.updated_at)}</span></div>`).join("");
  const assetItems = (assets.items || []).map(a => `<div class="asset-item ${a.exists ? "ok" : ""}"><i></i><span title="${esc(a.path)}">${esc(a.label)}</span><code>${a.exists ? "ready" : "missing"}</code></div>`).join("");
  const rag = assets.rag || {}, sediment = assets.sediment || {};
  const formal = d.formal_planning || {};
  const lastError = runtime.last_error;
  const lastEvent = runtime.last_event || {};
  const errorRecovered = lastError && lastEvent.time && new Date(lastEvent.time).getTime() > new Date(lastError.time || 0).getTime() && !lastEvent.failed;
  const healthTag = `<span class="tag health-${health.status || "warning"}">${healthName[health.status] || "待校验"}</span>`;
  const workTitle = w.mode === "rag" ? "RAG 重建" : w.mode === "planning" ? (stageName[runtime.current_stage] || "规划阶段") : w.mode === "rewrite" ? `返工第 ${w.chapter} 章` : chapterText(w.chapter, "尚未进入章节");
  return `
    <div class="detail-kpis">
      <div class="detail-kpi"><div class="k">正文游标</div><div class="v">${chapterText(d.current_chapter)}</div></div>
      <div class="detail-kpi"><div class="k">实际工作</div><div class="v">${workTitle}</div></div>
      <div class="detail-kpi"><div class="k">完成 / 目标</div><div class="v">${d.chapters_completed} / ${d.chapters_total || "?"}</div></div>
      <div class="detail-kpi"><div class="k">正文实算</div><div class="v">${fmtNum(d.words_total)}</div></div>
      <div class="detail-kpi"><div class="k">评审 / 门禁</div><div class="v">${d.reviews_accepted} / ${d.gate_passed}</div></div>
      <div class="detail-kpi"><div class="k">累计成本</div><div class="v">${fmtMoney(d.cost_usd)}</div></div>
    </div>
    <div class="sec"><h3>当前执行</h3>
      <div class="panel">
        <div class="kv"><span class="k">状态</span><span><span class="tag ${runtime.status === "running" ? "ok" : runtime.status === "error" ? "rewrite" : "pending"}">${runtimeName[runtime.status] || esc(runtime.status)}</span>　${esc(runtime.provider || "—")} / <b>${esc(runtime.model || "—")}</b>${runtime.planning_tier ? ` / ${esc(runtime.planning_tier)}` : ""}</span></div>
        <div class="kv"><span class="k">当前位置</span><span>${pos.volume_title ? `卷 ${pos.volume}《${esc(pos.volume_title)}》 · 弧 ${pos.arc}「${esc(pos.arc_title)}」` : `卷 ${d.volume || "?"} · 弧 ${d.arc || "?"}`}${pos.arc_total ? `　${pos.arc_completed}/${pos.arc_total} 章` : ""}</span></div>
        ${pos.arc_goal ? `<div class="kv"><span class="k">弧目标</span><span>${esc(pos.arc_goal)}</span></div>` : ""}

function clockHTML(name, c, extra) {
  const segs = c.segments || 0, prog = c.progress || 0;
  const cells = Array.from({ length: segs }, (_, i) => `<i class="${i < prog ? "f" : ""}"></i>`).join("");
  return `<div class="clock"><div class="t"><b>${esc(name)}</b><em>${prog}/${segs}${c.pace ? " · " + esc(c.pace) : ""}</em></div>
    ${segs ? `<div class="segs">${cells}</div>` : ""}
    ${c.consequence ? `<div style="font-size:11.5px;color:var(--muted);margin-top:4px">走满 → ${esc(c.consequence)}</div>` : ""}${extra || ""}</div>`;
}

// SVG 分段环形进度钟（Blades 式）：segs 段，已走 prog 段
function ringGauge(segs, prog, size = 58) {
  const r = size / 2 - 5, cx = size / 2, cy = size / 2, gap = segs > 1 ? 7 : 0;
  const per = 360 / (segs || 1);
  const arc = (a0, a1, filled) => {
    const rad = a => (a - 90) * Math.PI / 180;
    const x0 = cx + r * Math.cos(rad(a0)), y0 = cy + r * Math.sin(rad(a0));
    const x1 = cx + r * Math.cos(rad(a1)), y1 = cy + r * Math.sin(rad(a1));
    const large = a1 - a0 > 180 ? 1 : 0;
    return `<path d="M${x0.toFixed(1)} ${y0.toFixed(1)} A${r} ${r} 0 ${large} 1 ${x1.toFixed(1)} ${y1.toFixed(1)}"
      fill="none" stroke="${filled ? "#0f766e" : "#dce3df"}" stroke-width="5" stroke-linecap="round"/>`;
  };
  let paths = "";
  for (let i = 0; i < (segs || 1); i++) paths += arc(i * per + gap / 2, (i + 1) * per - gap / 2, i < prog);
  const pctText = segs ? `${prog}/${segs}` : "—";
  return `<svg class="ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    ${paths}
    <text x="${cx}" y="${cy + 4}" text-anchor="middle" font-size="13" font-weight="700" fill="#202824" font-family="monospace">${pctText}</text>
  </svg>`;
}

function clockCard(name, c) {
  return `<div class="clockcard">${ringGauge(c.segments || 0, c.progress || 0)}
    <div class="cbody"><b>${esc(name)}</b>
      ${c.pace ? `<div class="cmeta">节奏 ${esc(c.pace)}</div>` : ""}
      ${c.consequence ? `<div class="cons">走满 → ${esc(c.consequence)}</div>` : ""}</div></div>`;
}

function oceanHTML(bf) {
  if (!bf || !Object.keys(bf).length) return "";
  return `<div class="ocean">${OCEAN_AXES.map(([k, l]) => {
    const v = bf[k];
    if (v == null) return "";
    return `<div class="ax"><div class="t"><i style="height:${Math.max(8, Math.round(v * 100))}%"></i></div><div class="l">${l}</div><div class="n">${(v * 100).toFixed(0)}</div></div>`;
  }).join("")}</div>`;
}

function dnaHTML(dna) {
  if (!dna) return "";
  const row = (lab, arr, cls) => (arr && arr.length)
    ? `<div class="row"><span class="lab">${lab}</span><span>${arr.map(x => `<span class="tag ${cls}" style="margin:1px" title="${esc(x)}">${esc(x)}</span>`).join(" ")}</span></div>` : "";
  const html = row("显性", dna.exposed, "blue") + row("隐性", dna.hidden, "pending") + row("突变", dna.latent, "purple");
  return html ? `<div class="dna">${html}</div>` : "";
}

/* ---------- 成长轨迹：生命线 + 决策流 ---------- */
let growthCache = null;      // 缓存本书 growth 数据，供决策筛选无需重取
let decisionFilter = "__all__";

function splitArc(dir) {
  // arc_direction 通常是「前期，…；中期，…；后期，…」三段
  const out = { p0: "", p1: "", p2: "" };
  if (!dir) return out;
  const grab = (re) => { const m = dir.match(re); return m ? m[1].trim().replace(/^[，,、]/, "") : ""; };
  out.p0 = grab(/前期[，,]?([^；;]*)/);
  out.p1 = grab(/中期[，,]?([^；;]*)/);
  out.p2 = grab(/后期[，,]?([^；;]*)/);
  if (!out.p0 && !out.p1 && !out.p2) out.p0 = dir; // 非三段式，整段放前期位
  return out;
}

function lifeline(c, total, cur) {
  const span = Math.max(total || 0, cur || 0, ...(c.appearance_chapters || []), 1);
  const x = ch => (span > 1 ? (ch - 1) / (span - 1) * 100 : 0);
  const chs = c.appearance_chapters || [];
  const first = c.first_seen || (chs[0] || 1), last = c.last_seen || (chs[chs.length - 1] || first);
  const nodes = chs.map(ch => `<div class="node" style="left:${x(ch)}%" title="第 ${ch} 章出场"></div>`).join("");
  const future = (c.next_use_chapter && c.next_use_chapter > (cur || 0))
    ? `<div class="node future" style="left:${x(c.next_use_chapter)}%" title="计划第 ${c.next_use_chapter} 章回归"></div>` : "";
  const nowMark = cur ? `<div class="now" style="left:${x(cur)}%" title="当前第 ${cur} 章"></div>` : "";
  const axis = [1, Math.round(span / 2), span].filter((v, i, a) => a.indexOf(v) === i)
    .map(v => `<div class="cax" style="left:${x(v)}%">${v}</div>`).join("");
  const arc = splitArc(c.arc_direction);
  const phases = (arc.p0 || arc.p1 || arc.p2) ? `<div class="phases">
    <div class="phase p0"><div class="pt">前期</div>${esc(arc.p0) || "—"}</div>
    <div class="phase p1"><div class="pt">中期</div>${esc(arc.p1) || "—"}</div>
    <div class="phase p2"><div class="pt">后期</div>${esc(arc.p2) || "—"}</div></div>` : "";
  const facts = (c.current_facts || []).length ? `<div class="facts">${c.current_facts.map(f => {
    const m = String(f).match(/^第\s*(\d+)\s*章/);
    return `<div class="f"><span class="cb">${m ? "第" + m[1] + "章" : "现状"}</span><span>${esc(m ? f.replace(/^第\s*\d+\s*章[：: ]*/, "") : f)}</span></div>`;
  }).join("")}</div>` : "";
  const la = c.long_arc || {};
  const longarc = (la.first_three_volumes || la.later_macro) ? `<div class="longarc">
    <b style="color:#aab3c9">长弧规划</b>　${esc(la.first_three_volumes)}${la.later_macro ? "　" + esc(la.later_macro) : ""}</div>` : "";
  return `<div class="lifeline">
    <div class="lhead"><b>${esc(c.name)}</b><span class="role">${esc(c.role)}</span>
      <span class="tag ${c.group === "core" ? "now" : c.group === "important" ? "blue" : "pending"}">${TIER_LABEL[c.tier] || esc(c.tier)}</span>
      <span class="count">出场 ${c.appearance_count} 次 · 第 ${first}–${last} 章</span></div>
    <div class="track"><div class="rail"></div>
      <div class="span" style="left:${x(first)}%;width:${Math.max(0, x(last) - x(first))}%"></div>
      ${nodes}${future}${nowMark}${axis}</div>
    ${phases}${facts}${longarc}</div>`;
}

function decisionStream(decisions, entity) {
  const list = entity === "__all__" ? decisions : decisions.filter(d => d.entity === entity);
  if (!list.length) return '<div class="loading">该人物暂无记录的状态变化。</div>';
  return `<div class="dstream">${list.map(d => `<div class="dnode"><div class="dcard">
    <div class="dh"><span class="tag purple">第 ${d.chapter} 章</span><b>${esc(d.entity)}</b><span class="fld">· ${esc(d.field)}</span></div>
    <div class="transit"><span class="from">${esc(d.old) || "—"}</span><span class="arr">→</span><span class="to">${esc(d.new)}</span></div>
    ${d.reason ? `<div class="why">因为：${esc(d.reason)}</div>` : ""}
  </div></div>`).join("")}</div>`;
}

function renderGrowth(g) {
  growthCache = g;
  const chars = g.characters || [];
  const lifelines = chars.length
    ? chars.map(c => lifeline(c, g.total_chapters, g.current_chapter)).join("")
    : '<div class="loading">人物成长轨迹随章节 commit 累积——character_continuity 生成后出现。</div>';
  const counts = g.decision_counts || {};
  const entities = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
  const total = (g.decisions || []).length;
  const filters = `<div class="dfilter">
    <button class="fb ${decisionFilter === "__all__" ? "on" : ""}" data-ent="__all__">全部 ${total}</button>
    ${entities.map(e => `<button class="fb ${decisionFilter === e ? "on" : ""}" data-ent="${esc(e)}">${esc(e)} ${counts[e]}</button>`).join("")}</div>`;
  return `
    <div class="sec"><h3>人物成长轨迹（${chars.length} 人 · 出场时间线 + 阶段弧向 + 当前事实）</h3>${lifelines}</div>
    <div class="sec"><h3>决策与状态变化流（${total} 条 · old → new + 理由）</h3>
      ${total ? filters + `<div id="dstream-wrap">${decisionStream(g.decisions, decisionFilter)}</div>`
              : '<div class="loading">决策流随章节 commit 的 state_changes 累积。</div>'}
    </div>`;
}

function renderQuality(q) {
  const rows = q.chapters || [];
  const cards = rows.map(c => {
    const m = c.metrics || {};
    const aiPct = c.aigc_percent == null ? "—" : `${Number(c.aigc_percent).toFixed(1)}%`;
    const judgePct = c.judge_probability == null ? "—" : `${Number(c.judge_probability).toFixed(1)}%`;
    const dialogue = m.dialogue_ratio == null ? "—" : `${(Number(m.dialogue_ratio) * 100).toFixed(1)}%`;
    const voice = m.ai_voice_score == null ? "—" : Number(m.ai_voice_score).toFixed(2);
    const dimensions = (c.dimensions || []).map(d => `<tr><td><b>${esc(d.name)}</b></td><td>${d.score ?? "—"}</td><td><span class="tag ${d.verdict === "pass" ? "ok" : "rewrite"}">${esc(d.verdict) || "—"}</span></td><td style="color:#46544d">${esc(d.comment)}</td></tr>`).join("");
    const violations = (c.violations || []).map(v => `<tr><td><span class="tag ${v.severity === "error" ? "rewrite" : "now"}">${esc(v.severity) || "warning"}</span></td><td>${esc(v.type) || "—"}</td><td style="color:#46544d">${esc(v.description)}</td></tr>`).join("");
    const freshTag = c.freshness === "fresh" ? '<span class="tag ok">版本一致</span>' : c.freshness === "stale" ? '<span class="tag rewrite">评审过期</span>' : '<span class="tag pending">版本未知</span>';
    return `<article class="quality-chapter">
      <div class="quality-chapter-head"><b>第 ${c.chapter} 章 · ${esc(c.title)}</b><span class="spacer"></span>${verdictTag(c.review_verdict)}<span class="tag ${c.gate === "pass" ? "ok" : c.gate === "fail" ? "rewrite" : "pending"}">门禁 ${esc(c.gate) || "未跑"}</span>${freshTag}</div>
      <div class="quality-chapter-body">
        <div class="quality-summary-grid">
          <div class="cell"><b>${aiPct}</b><span>本地 AIGC · ${esc(c.aigc_risk) || "未评级"}</span></div>
          <div class="cell"><b>${judgePct}</b><span>外部判定 · ${esc(c.judge_verdict) || "未跑"}</span></div>
          <div class="cell"><b>${voice}</b><span>AI 腔分</span></div>
          <div class="cell"><b>${dialogue}</b><span>对白占比</span></div>
          <div class="cell"><b>${m.protagonist_waver == null ? "—" : m.protagonist_waver ? "有" : "无"}</b><span>主角真实动摇</span></div>
        </div>
        ${c.review_summary ? `<div class="kv"><span class="k">评审结论</span><span>${esc(c.review_summary)}</span></div>` : ""}
        ${c.judge_summary ? `<div class="kv"><span class="k">外部判定</span><span>${esc(c.judge_summary)}${c.judge_model ? ` <span class="tag pending">${esc(c.judge_model)}</span>` : ""}</span></div>` : ""}
        ${violations ? `<details style="margin-top:9px"><summary>门禁问题 ${c.gate_errors} error · ${c.gate_warnings} warning</summary><div class="table-wrap"><table><thead><tr><th>级别</th><th>类型</th><th>说明</th></tr></thead><tbody>${violations}</tbody></table></div></details>` : ""}
        ${dimensions ? `<details style="margin-top:9px"><summary>评审维度 ${(c.dimensions || []).length} 项</summary><div class="table-wrap"><table><thead><tr><th>维度</th><th>分数</th><th>结论</th><th>说明</th></tr></thead><tbody>${dimensions}</tbody></table></div></details>` : ""}
      </div>
    </article>`;
  }).join("");
  return `<div class="detail-kpis">
    <div class="detail-kpi"><div class="k">评审通过</div><div class="v">${q.accepted || 0}</div></div>
    <div class="detail-kpi"><div class="k">待返工</div><div class="v">${q.rewrite || 0}</div></div>
    <div class="detail-kpi"><div class="k">门禁通过</div><div class="v">${q.gate_passed || 0}</div></div>
    <div class="detail-kpi"><div class="k">门禁失败</div><div class="v">${q.gate_failed || 0}</div></div>
    <div class="detail-kpi"><div class="k">过期评审</div><div class="v">${q.stale || 0}</div></div>
    <div class="detail-kpi"><div class="k">平均 AIGC</div><div class="v">${q.average_aigc_percent == null ? "—" : Number(q.average_aigc_percent).toFixed(1) + "%"}</div></div>
  </div><div class="sec"><h3>逐章质量明细（${rows.length}）</h3>${cards || '<div class="loading">尚无质量产物。</div>'}</div>`;
}

// 决策筛选：事件委托，切换不重取数据
document.addEventListener("click", e => {
  const fb = e.target.closest(".dfilter .fb");
  if (!fb || !growthCache) return;
  decisionFilter = fb.dataset.ent;
  document.querySelectorAll(".dfilter .fb").forEach(b => b.classList.toggle("on", b.dataset.ent === decisionFilter));
  const wrap = $("#dstream-wrap");
  if (wrap) wrap.innerHTML = decisionStream(growthCache.decisions, decisionFilter);
});

function renderLog(d) {
  const runtime = d.runtime || {};
  const events = [...(runtime.recent_events || [])].reverse().map(e => `<div class="event-row ${e.failed ? "failed" : ""}"><time>${shortTime(e.time)}</time><span>${esc(e.agent) || "system"}</span><span>${esc(e.category) || "event"}</span><span>${esc(e.summary) || esc(e.detail)}</span></div>`).join("");
  const lines = (d.log || []).map(l =>
    `<span class="${/ERROR|WARN|失败|错误/.test(l) ? "hl" : ""}">${esc(l)}</span>`).join("\n");
  return `<div class="detail-kpis">
    <div class="detail-kpi"><div class="k">运行状态</div><div class="v">${runtimeName[runtime.status] || "—"}</div></div>
    <div class="detail-kpi"><div class="k">Provider</div><div class="v">${esc(runtime.provider) || "—"}</div></div>
    <div class="detail-kpi"><div class="k">模型</div><div class="v">${esc(runtime.model) || "—"}</div></div>
    <div class="detail-kpi"><div class="k">规划档位</div><div class="v">${esc(runtime.planning_tier) || "—"}</div></div>
    <div class="detail-kpi"><div class="k">Pipeline</div><div class="v">${(d.pipeline_completed || []).length}/${(d.pipeline_stages || []).length}</div></div>
    <div class="detail-kpi"><div class="k">最近活动</div><div class="v">${ago(runtime.updated_at)}</div></div>

  <div class="sec"><h3>实时事件（近 ${(runtime.recent_events || []).length} 条）</h3>${events ? `<div class="event-list">${events}</div>` : '<div class="loading">暂无运行事件。</div>'}</div>
  <div class="sec"><h3>原始日志（末尾 ${(d.log || []).length} 行，自动刷新）</h3><div class="log" id="d-log">${lines || "（暂无日志）"}</div></div>`;
}

      const d = await api("/api/novels/" + encodeURIComponent(currentDetail));
      $("#d-title").textContent = d.name;
      const ph = $("#d-phase");
      ph.textContent = phaseName[d.phase] || d.phase;
      ph.className = "pill phase-" + d.phase;
      if (currentTab === "overview") { body.innerHTML = renderOverview(d); return; }
      const prev = $("#d-log");
      const stick = !keepScroll || !prev || (prev.scrollTop + prev.clientHeight >= prev.scrollHeight - 20);
      body.innerHTML = renderLog(d);
      const log = $("#d-log");
      if (log && stick) log.scrollTop = log.scrollHeight;
      return;
    }
    const d = await api(`/api/novels/${encodeURIComponent(currentDetail)}/${currentTab}`);
    if (currentTab === "setting") body.innerHTML = renderSetting(d);
    else if (currentTab === "cast") body.innerHTML = renderCast(d);
    else if (currentTab === "growth") body.innerHTML = renderGrowth(d);
    else if (currentTab === "plan") body.innerHTML = renderPlan(d);
    else if (currentTab === "offscreen") body.innerHTML = renderOffscreen(d);
    else if (currentTab === "quality") body.innerHTML = renderQuality(d);
  } catch (e) {
    body.innerHTML = `<div class="loading">加载失败：${esc(e.message)}，稍后自动重试…</div>`;
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("on", b.dataset.tab === tab));
  $("#d-body").innerHTML = '<div class="loading">加载中…</div>';
  loadTab(false);
}
document.querySelectorAll(".tab").forEach(b => b.addEventListener("click", () => switchTab(b.dataset.tab)));

function openDetail(dir) {
  currentDetail = dir;
  overlay.classList.add("show");
  drawer.classList.add("show");
  switchTab(currentTab || "overview");
  clearInterval(detailTimer);
  detailTimer = setInterval(() => currentDetail && loadTab(true), 4000);
}
function closeDetail() {
  currentDetail = null;
  clearInterval(detailTimer);
  overlay.classList.remove("show");
  drawer.classList.remove("show");
}
overlay.addEventListener("click", closeDetail);
$("#d-close").addEventListener("click", closeDetail);
document.addEventListener("keydown", e => e.key === "Escape" && closeDetail());

refresh();
setInterval(refresh, 4000);
</script>
</body>
</html>
