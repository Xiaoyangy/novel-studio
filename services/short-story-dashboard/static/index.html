<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>短篇小说生成控制台</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>短篇小说生成控制台</h1>
      <p>查看项目数据、阶段进度、章节状态和产物内容。</p>
    </div>
    <div class="topbar-actions">
      <a class="button-link" href="/novel.html">小说项目看板</a>
      <button id="refreshBtn" type="button">刷新</button>
    </div>
  </header>

  <main class="layout">
    <section class="panel projects-panel">
      <div class="panel-title">
        <h2>项目</h2>
        <span id="projectCount">0</span>
      </div>
      <div id="projectList" class="project-list"></div>
    </section>

    <section class="panel detail-panel">
      <div id="emptyState" class="empty" hidden>
        暂无项目数据。
      </div>
      <div id="summaryDetail">
        <div class="detail-head">
          <div>
            <h2>数据汇总</h2>
            <p id="summaryMeta">等待刷新</p>
          </div>
        </div>
        <div id="summaryMetrics" class="metrics-grid"></div>
        <section class="workspace-card full summary-card">
          <div class="panel-title">
            <h3>进行中的文章</h3>
            <span id="summaryUpdated">等待刷新</span>
          </div>
          <div id="summaryList" class="summary-list"></div>
        </section>
      </div>
      <div id="projectDetail" hidden>
        <div class="detail-head">
          <div>
            <h2 id="detailTitle"></h2>
            <p id="detailMeta"></p>
          </div>
        </div>

        <div id="metricsGrid" class="metrics-grid"></div>
        <div class="progress-row">
          <span>阶段进度</span>
          <div class="progress-track">
            <div id="stageProgress" class="progress-fill"></div>
          </div>
          <span id="stageProgressText">0%</span>
        </div>

        <div id="stageRail" class="stage-rail"></div>

        <section class="workspace-card full data-card">
          <div class="panel-title">
            <h3>文档进度</h3>
            <span id="metricsUpdated">等待刷新</span>
          </div>
          <div id="typeProgress" class="type-progress"></div>
          <div id="artifactStats" class="artifact-stats"></div>
        </section>

        <section class="workspace-card full chapter-card">
          <div class="panel-title">
            <h3>分章写作</h3>
            <span id="chapterAgent">等待项目</span>
          </div>
          <div id="chapterList" class="chapter-list"></div>
          <div class="chapter-toolbar">
            <select id="chapterSelect"></select>
            <select id="chapterPromptMode">
              <option value="write">写作提示词</option>
              <option value="audit">审核提示词</option>
              <option value="revise">质量修订提示词</option>
            </select>
            <button id="copyChapterPromptBtn" type="button">复制提示词</button>
            <button id="markChapterPassedBtn" type="button">本章达标并解锁下一章</button>
          </div>
          <textarea id="chapterPromptBox" rows="8" spellcheck="false"></textarea>
          <div class="chapter-editors">
            <section>
              <div class="panel-title">
                <h3>章节正文</h3>
                <button id="saveChapterBtn" type="button">保存正文并审核</button>
              </div>
              <textarea id="chapterEditor" rows="16" spellcheck="false"></textarea>
            </section>
            <section>
              <div class="panel-title">
                <h3>章节审核</h3>
                <button id="saveChapterAuditBtn" type="button">保存审核</button>
              </div>
              <textarea id="chapterAuditEditor" rows="16" spellcheck="false"></textarea>
            </section>
          </div>
        </section>

        <div class="workspace">
          <section class="workspace-card">
            <div class="panel-title">
              <h3>阶段提示词</h3>
              <button id="copyPromptBtn" type="button">复制</button>
            </div>
            <select id="promptStage"></select>
            <textarea id="promptBox" rows="14" spellcheck="false"></textarea>
          </section>

          <section class="workspace-card">
            <div class="panel-title">
              <h3>产物编辑</h3>
              <div class="panel-actions">
                <span id="artifactLiveStats">0 字符</span>
                <button id="saveArtifactBtn" type="button">保存</button>
              </div>
            </div>
            <select id="artifactSelect"></select>
            <textarea id="artifactEditor" rows="14" spellcheck="false"></textarea>
          </section>
        </div>

        <section class="workspace-card full">
          <h3>事件记录</h3>
          <div id="eventLog" class="event-log"></div>
        </section>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>
  <script src="/app.js"></script>
</body>
</html>
